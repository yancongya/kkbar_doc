<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="sort-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#FF8E53"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="88" height="88" rx="12" fill="url(#sort-gradient)"/>
  <g fill="white" transform="translate(64,64)">
    <!-- 排序列表 -->
    <rect x="-25" y="-25" width="50" height="10" rx="3" fill="white"/>
    <rect x="-25" y="-10" width="50" height="10" rx="3" fill="white" opacity="0.8"/>
    <rect x="-25" y="5" width="50" height="10" rx="3" fill="white" opacity="0.6"/>
    <rect x="-25" y="20" width="50" height="10" rx="3" fill="white" opacity="0.4"/>
    <!-- 拖拽手柄 -->
    <circle cx="-15" cy="-20" r="2" fill="#FF6B6B"/>
    <circle cx="-15" cy="-5" r="2" fill="#FF6B6B"/>
    <circle cx="-15" cy="10" r="2" fill="#FF6B6B"/>
    <circle cx="-15" cy="25" r="2" fill="#FF6B6B"/>
    <!-- 移动箭头 -->
    <path d="M15,-20 L20,-25 L25,-20" fill="none" stroke="#FF6B6B" stroke-width="2"/>
    <path d="M15,25 L20,20 L25,25" fill="none" stroke="#FF6B6B" stroke-width="2"/>
  </g>
</svg>