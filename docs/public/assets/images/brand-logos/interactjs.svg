<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="interact-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3"/>
      <stop offset="100%" style="stop-color:#1976D2"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="88" height="88" rx="12" fill="url(#interact-gradient)"/>
  <g fill="white" transform="translate(64,64)">
    <!-- 拖拽手柄 -->
    <circle r="6" transform="translate(-20,-20)"/>
    <circle r="6" transform="translate(20,-20)"/>
    <circle r="6" transform="translate(-20,20)"/>
    <circle r="6" transform="translate(20,20)"/>
    <!-- 中心移动箭头 -->
    <path d="M-8,0 L0,-8 L8,0 L0,8 Z" fill="white"/>
    <!-- 移动指示线 -->
    <line x1="-15" y1="0" x2="-10" y2="0" stroke="white" stroke-width="2"/>
    <line x1="10" y1="0" x2="15" y2="0" stroke="white" stroke-width="2"/>
    <line x1="0" y1="-15" x2="0" y2="-10" stroke="white" stroke-width="2"/>
    <line x1="0" y1="10" x2="0" y2="15" stroke="white" stroke-width="2"/>
  </g>
</svg>