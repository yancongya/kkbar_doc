<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="nano-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C9FF"/>
      <stop offset="100%" style="stop-color:#92FE9D"/>
    </linearGradient>
  </defs>
  <circle cx="64" cy="64" r="50" fill="url(#nano-gradient)"/>
  <g fill="white" transform="translate(64,64)">
    <!-- ID生成器概念 -->
    <rect x="-30" y="-20" width="60" height="40" rx="6" fill="none" stroke="white" stroke-width="3"/>
    <!-- 随机字符 -->
    <text x="-15" y="-5" font-family="monospace" font-size="12" font-weight="bold" fill="white">n</text>
    <text x="-5" y="5" font-family="monospace" font-size="10" fill="white">a</text>
    <text x="5" y="-5" font-family="monospace" font-size="11" fill="white">n</text>
    <text x="15" y="5" font-family="monospace" font-size="9" fill="white">o</text>
    <!-- 闪电符号表示快速 -->
    <path d="M20,-15 L15,-5 L20,-5 L15,5" fill="none" stroke="white" stroke-width="2"/>
  </g>
</svg>