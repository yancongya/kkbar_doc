<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="zip-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7DF1E"/>
      <stop offset="100%" style="stop-color:#E8C900"/>
    </linearGradient>
  </defs>
  <rect x="20" y="20" width="88" height="88" rx="8" fill="url(#zip-gradient)"/>
  <g fill="#333" transform="translate(64,64)">
    <!-- ZIP文件图标 -->
    <rect x="-25" y="-30" width="50" height="60" rx="4" fill="white" stroke="#333" stroke-width="2"/>
    <!-- ZIP拉链 -->
    <rect x="-5" y="-30" width="10" height="60" fill="#F7DF1E"/>
    <rect x="-5" y="-25" width="10" height="8" fill="#333"/>
    <rect x="-5" y="-12" width="10" height="8" fill="#333"/>
    <rect x="-5" y="1" width="10" height="8" fill="#333"/>
    <rect x="-5" y="14" width="10" height="8" fill="#333"/>
    <!-- JS文字 -->
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">JS</text>
  </g>
</svg>